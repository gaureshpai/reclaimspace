name: Publish Package

on:
  push:
    tags:
      - 'v*'

permissions:
  id-token: write
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Tests
        run: pnpm test

      - name: Publish to NPM
        run: npm publish --provenance --access public

      - name: Update CHANGELOG with release version
        run: |
          VERSION="${GITHUB_REF_NAME}"
          DATE=$(date -u +"%Y-%m-%d")
          
          # Insert release checkpoint with separator before ## Unreleased, then rename to today's date
          # and add a fresh ## Unreleased section at the top for future entries
          sed -i "/^## Unreleased$/i ---\n\n> **Release: ${VERSION} — ${DATE}**\n" CHANGELOG.md
          sed -i "s/^## Unreleased$/## ${DATE}/" CHANGELOG.md
          
          # Add a fresh ## Unreleased section at the top for next development cycle
          sed -i "1,/^## ${DATE}$/ { /^## ${DATE}$/i ## Unreleased\n" } CHANGELOG.md
          
          # Commit and push only if there are actual changes
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          if git diff --cached --quiet; then
            echo "No CHANGELOG changes to commit"
          else
            git commit -m "docs: update CHANGELOG for ${VERSION}"
            git push
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
