name: Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    environment: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install
      - name: Verify package
        run: pnpm pack --dry-run
      - name: Run tests
        run: pnpm test

  report-status:
    if: ${{ always() }}
    needs: [test]
    uses: ./.github/workflows/reporter.yml
    with:
      workflow_name: "Test"
      conclusion: ${{ needs.test.result }}
      run_id: ${{ github.run_id }}
    permissions:
      pull-requests: write
      contents: read
