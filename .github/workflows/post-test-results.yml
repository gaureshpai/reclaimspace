name: Post Test Results

on:
  workflow_run:
    workflows: [CI]
    types: [completed]

permissions:
  contents: read
  issues: write
  pull-requests: write
  actions: read

jobs:
  aggregate-report:
    runs-on: ubuntu-latest
    steps:
      - name: Aggregate and post combined status
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const triggerRun = context.payload.workflow_run;
            const headBranch = triggerRun.head_branch;
            const headSha = triggerRun.head_sha;

            // 1) Find the associated Pull Request
            let prNumber = triggerRun.pull_requests?.[0]?.number;

            if (!prNumber) {
              const headRepoFull = triggerRun.head_repository?.full_name;
              if (headRepoFull && headBranch) {
                const headSpecifier = `${headRepoFull.split('/')[0]}:${headBranch}`;
                const { data: prs } = await github.rest.pulls.list({
                  owner, repo, state: 'open', head: headSpecifier
                });
                if (prs.length) prNumber = prs[0].number;
              }
            }

            if (!prNumber) {
              core.info('No pull request associated with this run.');
              return;
            }

            // 2) Fetch check runs for the latest commit on this PR
            const { data: checkRuns } = await github.rest.checks.listForRef({
              owner,
              repo,
              ref: headSha
            });

            // 3) Find the CI check run
            const ciCheck = checkRuns.check_runs.find(c => c.name === 'ci');
            const conclusion = ciCheck?.conclusion || triggerRun.conclusion || 'pending';
            const checkUrl = ciCheck?.html_url || triggerRun.html_url;

            // 4) Build report
            const emoji =
              conclusion === 'success' ? '✅' :
              conclusion === 'failure' ? '❌' :
              conclusion === 'cancelled' ? '⏹️' :
              conclusion === 'timed_out' ? '⏰' : '🔄';

            const statusText =
              conclusion === 'success' ? 'all passed' :
              conclusion === 'failure' ? 'failed' :
              conclusion === 'cancelled' ? 'cancelled' :
              conclusion === 'timed_out' ? 'timed out' : 'in progress';

            const link = checkUrl ? `[details](${checkUrl})` : '-';

            const body = `### ${emoji} CI Status <!-- ci-cd-test-results -->\n\n` +
                         `**Overall**: ${statusText} \`${conclusion}\` ${link}\n\n` +
                         `---\n` +
                         `_Last updated by ${triggerRun.name} workflow_\n`;

            // 5) Update or Create comment
            const { data: comments } = await github.rest.issues.listComments({
              owner, repo, issue_number: prNumber
            });
            const botComment = comments.find(c =>
              c.user?.login === 'github-actions[bot]' && c.body?.includes('<!-- ci-cd-test-results -->')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner, repo, comment_id: botComment.id, body
              });
              core.info(`Updated combined status comment #${botComment.id}`);
            } else {
              await github.rest.issues.createComment({
                owner, repo, issue_number: prNumber, body
              });
              core.info('Created combined status comment');
            }
