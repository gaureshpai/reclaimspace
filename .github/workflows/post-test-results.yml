name: Post Test Results

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: read
  issues: write
  pull-requests: write
  actions: read

jobs:
  comment-on-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Post comment on Pull Request
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo  = context.repo.repo;
            const run = context.payload.workflow_run;
            const overallStatus = run.conclusion;

            // 1) Find the associated Pull Request
            let prNumber = run.pull_requests?.[0]?.number;

            if (!prNumber) {
              const headBranch = run.head_branch;
              const headRepoFull = run.head_repository?.full_name;
              if (headRepoFull && headBranch) {
                const headSpecifier = `${headRepoFull.split('/')[0]}:${headBranch}`;
                const { data: prs } = await github.rest.pulls.list({
                  owner, repo, state: 'open', head: headSpecifier
                });
                if (prs.length) prNumber = prs[0].number;
              }
            }

            if (!prNumber) {
              core.info('No pull request associated with this run.');
              return;
            }

            // 2) Build simplified comment
            const statusEmoji = overallStatus === 'success' ? '✅' : '❌';
            const body = `### ${statusEmoji} CI/CD Test Results <!-- ci-cd-test-results -->\n` +
                         `**Overall Status**: ${overallStatus}\n\n` +
                         `---\n[View full workflow run](${run.html_url})`;

            // 3) Update or Create comment
            const { data: comments } = await github.rest.issues.listComments({
              owner, repo, issue_number: prNumber
            });
            const botComment = comments.find(c =>
              c.user?.login === 'github-actions[bot]' && c.body?.includes('<!-- ci-cd-test-results -->')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner, repo, comment_id: botComment.id, body
              });
            } else {
              await github.rest.issues.createComment({
                owner, repo, issue_number: prNumber, body
              });
            }
